<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - KMS Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="margin: 0; font-size: 1.5rem;">KMS Corporate</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Sign in to management console</p>
        </div>
        
        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" style="color: #f87171; background: rgba(248, 113, 113, 0.1); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.875rem; text-align: center;">
                Invalid username or password.
            </div>
            
            <label for="username" style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem;">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>
            
            <label for="password" style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem;">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
            
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - KMS Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { align-items: flex-start; padding: 2rem; }
        .dashboard-container { width: 100%; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { padding: 1.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div>
                <h1 style="margin: 0;">KMS Management</h1>
                <p style="color: var(--text-muted);">Monitoring corporate activations</p>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" style="width: auto; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);">Sign Out</button>
            </form>
        </div>

        <div class="stats">
            <div class="glass-card stat-card">
                <div style="color: var(--text-muted); font-size: 0.875rem;">Total Activations</div>
                <div class="stat-value" th:text="${totalActivations}">0</div>
            </div>
            <div class="glass-card stat-card">
                <div style="color: var(--text-muted); font-size: 0.875rem;">Renewal Cycle</div>
                <div class="stat-value">180 Days</div>
            </div>
            <div class="glass-card stat-card">
                <div style="color: var(--text-muted); font-size: 0.875rem;">System Status</div>
                <div class="stat-value" style="color: #4ade80;">Active</div>
            </div>
        </div>

        <div class="glass-card">
            <h2 style="margin-top: 0; font-size: 1.25rem;">Recent Activations</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Machine Name</th>
                            <th>IP Address</th>
                            <th>Software</th>
                            <th>Activation Date</th>
                            <th>Expiry Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="act : ${activations}">
                            <td th:text="${act.machineName}">Machine</td>
                            <td th:text="${act.ipAddress}">0.0.0.0</td>
                            <td th:text="${act.softwareName}">Windows 11</td>
                            <td th:text="${#temporals.format(act.activationDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                            <td th:text="${#temporals.format(act.expiryDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                            <td><span class="status-badge status-active">Renewed</span></td>
                        </tr>
                        <tr th:if="${activations.empty}">
                            <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 2rem;">No activations recorded yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

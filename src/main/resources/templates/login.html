<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar Sesión - Administrador KMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="glass-card" style="width: 100%; max-width: 440px; margin: 1.5rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <!-- Premium Shield SVG Icon -->
            <div style="width: 64px; height: 64px; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.25); border-radius: 1.25rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto; box-shadow: 0 8px 16px rgba(99, 102, 241, 0.15);">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <path d="M12 8v4"/>
                    <path d="M12 16h.01"/>
                </svg>
            </div>
            
            <h1 style="margin: 0; font-size: 1.85rem; font-family: var(--font-heading); background: linear-gradient(135deg, #ffffff 40%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">KMS Corporate</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.95rem;">Consola de Administración de Licencias</p>
        </div>
        
        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" style="color: var(--color-error); background: var(--color-error-bg); border: 1px solid rgba(244, 63, 94, 0.2); padding: 0.85rem; border-radius: 0.75rem; margin-bottom: 1.5rem; font-size: 0.875rem; text-align: center; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                Usuario o contraseña incorrectos.
            </div>
            
            <div>
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Introduce tu usuario" required autocomplete="username">
            </div>
            
            <div>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Introduce tu contraseña" required autocomplete="current-password">
            </div>
            
            <button type="submit" style="width: 100%; margin-top: 0.5rem;">
                <span>Iniciar Sesión</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>
        </form>
    </div>
</body>
</html>

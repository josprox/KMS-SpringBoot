server:
  port: ${WEB_PORT:8081}
kms:
  public-port: ${PORT:8080}
  internal-kms-port: 1688
spring:
  application:
    name: kms
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kms}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: public
    locations: classpath:db/migration
    validate-on-migrate: true

logging:
  level:
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
